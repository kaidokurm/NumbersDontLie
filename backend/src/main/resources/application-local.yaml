server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:tomcat}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ndl}
    username: ${DATABASE_USER:ndl}
    password: ${DATABASE_PASSWORD:ndl_password}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  web:
    resources:
      add-mappings: false
  mvc:
    throw-exception-if-no-handler-found: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://kj-ea-ndl.eu.auth0.com/
  # Email config for local development (disabled, logs to console)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

auth0:
  audience: ${AUTH0_AUDIENCE:https://numbers-dont-lie-api}
app:
  jwt:
    access-token-expiry-minutes: 15
    issuer: numbers-dont-lie
  security:
    token-pepper: ${APP_TOKEN_PEPPER:}
    data-encryption-key: ${APP_DATA_ENCRYPTION_KEY:change-me-in-env}
  two-factor:
    issuer: NumbersDontLie
  email:
    enabled: ${APP_EMAIL_ENABLED:false}
    from-address: ${APP_EMAIL_FROM_ADDRESS:noreply@numbersdontlie.app}
    from-name: ${APP_EMAIL_FROM_NAME:Numbers Don't Lie}
    # Frontend URL for verification links (used in email)
    frontend-url: ${APP_EMAIL_FRONTEND_URL:http://localhost:5173}
